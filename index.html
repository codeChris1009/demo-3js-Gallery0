<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D ART GALLERY</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,100..500;1,100..500&family=Stalemate&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="custom-cursor">
      <div class="cursor-ring"></div>
    </div>

    <div id="intro-overlay" aria-live="polite">
      <div id="intro-stage">
        <div id="intro-card-ring" aria-hidden="true">
          <div class="intro-card"></div>
          <div class="intro-card"></div>
          <div class="intro-card"></div>
          <div class="intro-card"></div>
          <div class="intro-card"></div>
          <div class="intro-card"></div>
        </div>
        <div id="intro-frame-glow"></div>
        <div id="intro-frame">
          <p id="intro-prep-label">PREPARING...</p>
          <div id="intro-countdown">3</div>
          <div id="intro-ready" hidden>READY</div>
          <p id="intro-enter-prompt" hidden>CLICK TO ENTER</p>
        </div>
      </div>
    </div>

    <script type="module" src="main.js"></script>

    <h1 id="title"></h1>
    <div id="artist-wrapper">
      <h2 id="artist"></h2>
    </div>
  </body>
</html>
